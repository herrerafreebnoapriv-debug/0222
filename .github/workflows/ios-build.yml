# iOS 用户端 App 构建（当前基于 app/ios，最低 iOS 16.0，统一使用 archive/export IPA）
# 触发：push/main、手动 workflow_dispatch
# IPA 签名需配置：p12-file-base64→IOS0222，Bundle ID→app.suyun9289.test，密码→Secret P12_PASSWORD（如 1）
name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.0'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor (diagnostics)
        run: flutter doctor -v
        working-directory: app

      - name: Precache iOS artifacts
        run: flutter precache --ios
        working-directory: app

      - name: Get dependencies
        run: flutter pub get
        working-directory: app

      - name: Check IPA signing secrets
        id: ipa_secrets
        run: |
          echo "has_cert=$([ -n \"$IOS0222\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_provision=$([ -n \"$BUILD_PROVISION_PROFILE_BASE64\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          IOS0222: ${{ secrets.IOS0222 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}

      - name: Ensure IPA signing secrets are present
        if: steps.ipa_secrets.outputs.has_cert != 'true' || steps.ipa_secrets.outputs.has_provision != 'true'
        run: |
          echo "archive/export IPA requires signing secrets." >&2
          echo "Missing one or more required secrets: IOS0222, BUILD_PROVISION_PROFILE_BASE64." >&2
          exit 1

      - name: Create keychain and import certificate
        env:
          IOS0222: ${{ secrets.IOS0222 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$IOS0222" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        id: install_provision
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          PLIST=$(security cms -D -i /tmp/profile.mobileprovision)
          UUID=$(echo "$PLIST" | plutil -extract UUID raw -)
          NAME=$(echo "$PLIST" | plutil -extract Name raw - 2>/dev/null || echo "unknown")
          TEAM_ID=$(echo "$PLIST" | plutil -extract TeamIdentifier.0 raw - 2>/dev/null || echo "$PLIST" | plutil -extract TeamIdentifier raw - 2>/dev/null)
          GET_TASK_ALLOW=$(echo "$PLIST" | plutil -extract Entitlements.get-task-allow raw - 2>/dev/null || echo "unknown")
          if echo "$PLIST" | plutil -extract ProvisionedDevices raw - >/dev/null 2>&1; then
            HAS_DEVICES=true
          else
            HAS_DEVICES=false
          fi
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"
          echo "Provisioning profile summary:"
          echo "  Name: $NAME"
          echo "  UUID: $UUID"
          echo "  Team ID: $TEAM_ID"
          echo "  get-task-allow: $GET_TASK_ALLOW"
          echo "  has ProvisionedDevices: $HAS_DEVICES"
          echo "profile_uuid=$UUID" >> $GITHUB_OUTPUT
          echo "profile_name=$NAME" >> $GITHUB_OUTPUT
          echo "team_id=$TEAM_ID" >> $GITHUB_OUTPUT
          if [ "$GET_TASK_ALLOW" = "true" ]; then
            echo "::error::BUILD_PROVISION_PROFILE_BASE64 是 Development 描述文件；当前 archive/export IPA 流程需要 Ad Hoc 或 Distribution 描述文件。"
            exit 1
          fi

      - name: Build iOS (no codesign) for IPA
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          EXPANDED_CODE_SIGN_IDENTITY: "-"
        run: |
          flutter build ios --release --no-codesign -v \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"
        working-directory: app

      - name: Prepare ExportOptions for manual export
        run: |
          PROFILE_UUID="${{ steps.install_provision.outputs.profile_uuid }}"
          PROFILE_NAME="${{ steps.install_provision.outputs.profile_name }}"
          TEAM_ID="${{ steps.install_provision.outputs.team_id }}"
          cat > app/ios/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.suyun9289.test</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST
          echo "Prepared ExportOptions.plist with team=${TEAM_ID}, profile=${PROFILE_NAME}, uuid=${PROFILE_UUID}"
        working-directory: .

      # 仅对 Runner 目标设置描述文件与开发团队，避免 Pods 报 "does not support provisioning profiles"
      - name: Set Runner-only code signing in project
        run: |
          python3 app/ios/scripts/set_runner_signing.py \
            app/ios/Runner.xcodeproj/project.pbxproj \
            "${{ steps.install_provision.outputs.team_id }}" \
            "${{ steps.install_provision.outputs.profile_uuid }}"
        working-directory: .

      - name: Archive and export IPA (iPhone Distribution)
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="iPhone Distribution"
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
        working-directory: app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: app/build/ios/ipa/*.ipa
