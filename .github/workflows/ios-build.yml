# iOS 用户端 App 构建（规约：最低 iOS 17.0，build_number 从 CI 取）
# 触发：push/main、手动 workflow_dispatch
# 无签名 Secrets：仅验证编译。IPA 签名需配置：p12-file-base64→IOS0222，Bundle ID→app.suyun9289.test，密码→Secret P12_PASSWORD（如 1）
name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.0'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor (diagnostics)
        run: flutter doctor -v
        working-directory: app

      - name: Precache iOS artifacts
        run: flutter precache --ios
        working-directory: app

      - name: Get dependencies
        run: flutter pub get
        working-directory: app

      - name: Patch iOS – disable Jitsi registration (after pub get)
        run: python3 scripts/patch_ios_jitsi.py
        working-directory: app

      # if 条件中不能使用 secrets，故用 step output 表示是否配置了签名（IOS0222）
      - name: Check IPA signing secrets
        id: ipa_secrets
        run: |
          echo "has_cert=$([ -n \"$IOS0222\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_provision=$([ -n \"$BUILD_PROVISION_PROFILE_BASE64\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_export_options=$([ -n \"$EXPORT_OPTIONS_PLIST\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          IOS0222: ${{ secrets.IOS0222 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}

      # 未配置签名 Secrets 时：仅验证编译（无 IPA）
      - name: Build iOS (no code signing)
        if: steps.ipa_secrets.outputs.has_cert != 'true'
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          EXPANDED_CODE_SIGN_IDENTITY: "-"
        run: |
          flutter build ios --release --no-codesign -v \
            --build-name="${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"
        working-directory: app

      # ========== 以下步骤仅在配置签名 Secrets 时执行（IOS0222 = P12 Base64），产出 IPA ==========
      - name: Create keychain and import certificate
        if: steps.ipa_secrets.outputs.has_cert == 'true'
        env:
          IOS0222: ${{ secrets.IOS0222 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$IOS0222" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        id: install_provision
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          PLIST=$(security cms -D -i /tmp/profile.mobileprovision)
          UUID=$(echo "$PLIST" | plutil -extract UUID raw -)
          TEAM_ID=$(echo "$PLIST" | plutil -extract TeamIdentifier.0 raw - 2>/dev/null || echo "$PLIST" | plutil -extract TeamIdentifier raw - 2>/dev/null)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"
          echo "profile_uuid=$UUID" >> $GITHUB_OUTPUT
          echo "team_id=$TEAM_ID" >> $GITHUB_OUTPUT

      - name: Write ExportOptions.plist from secret
        if: steps.ipa_secrets.outputs.has_export_options == 'true'
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          echo "$EXPORT_OPTIONS_PLIST" > app/ios/ExportOptions.plist
        working-directory: .

      # Flutter build ipa 只认“开发”证书，Distribution 证书会报 No valid certificates；改为先编译再 xcodebuild 归档与导出
      - name: Build iOS (no codesign) for IPA
        if: steps.ipa_secrets.outputs.has_cert == 'true'
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          EXPANDED_CODE_SIGN_IDENTITY: "-"
        run: |
          flutter build ios --release --no-codesign -v \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"
        working-directory: app

      # flutter build ios 可能重新生成 GeneratedPluginRegistrant.m，故在 archive 前再打一次补丁，确保 xcodebuild 编译的是无 Jitsi 注册的版本
      - name: Patch iOS – disable Jitsi registration (before archive)
        if: steps.ipa_secrets.outputs.has_cert == 'true'
        run: python3 scripts/patch_ios_jitsi.py
        working-directory: app

      - name: Prepare ExportOptions with profile UUID
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        run: |
          PROFILE_UUID="${{ steps.install_provision.outputs.profile_uuid }}"
          cat > app/ios/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.suyun9289.test</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          PLIST
        working-directory: .

      # 仅对 Runner 目标设置描述文件与开发团队，避免 Pods 报 "does not support provisioning profiles"
      - name: Set Runner-only code signing in project
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        run: |
          python3 app/ios/scripts/set_runner_signing.py \
            app/ios/Runner.xcodeproj/project.pbxproj \
            "${{ steps.install_provision.outputs.team_id }}" \
            "${{ steps.install_provision.outputs.profile_uuid }}"
        working-directory: .

      - name: Archive and export IPA (iPhone Distribution)
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="iPhone Distribution"
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
        working-directory: app

      - name: Upload IPA
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: app/build/ios/ipa/*.ipa
