# iOS 用户端 App 构建（规约：最低 iOS 17.0，build_number 从 CI 取）
# 触发：push/main、手动 workflow_dispatch
# 无签名 Secrets：仅验证编译。IPA 签名需配置：p12-file-base64→IOS0222，Bundle ID→app.suyun9289.test，密码→Secret P12_PASSWORD（如 1）
name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.0'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor (diagnostics)
        run: flutter doctor -v
        working-directory: app

      - name: Precache iOS artifacts
        run: flutter precache --ios
        working-directory: app

      - name: Get dependencies
        run: flutter pub get
        working-directory: app

      # 未配置签名 Secrets 时：仅验证编译（无 IPA）
      - name: Build iOS (no code signing)
        if: secrets.IOS0222 == ''
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          EXPANDED_CODE_SIGN_IDENTITY: "-"
        run: |
          flutter build ios --release --no-codesign -v \
            --build-name="${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"
        working-directory: app

      # ========== 以下步骤仅在配置签名 Secrets 时执行（IOS0222 = P12 Base64），产出 IPA ==========
      - name: Create keychain and import certificate
        if: secrets.IOS0222 != ''
        env:
          IOS0222: ${{ secrets.IOS0222 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$IOS0222" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        if: secrets.IOS0222 != '' && secrets.BUILD_PROVISION_PROFILE_BASE64 != ''
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

      - name: Write ExportOptions.plist from secret
        if: secrets.EXPORT_OPTIONS_PLIST != ''
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          echo "$EXPORT_OPTIONS_PLIST" > app/ios/ExportOptions.plist
        working-directory: .

      - name: Build IPA
        if: secrets.IOS0222 != ''
        run: |
          flutter build ipa -v \
            --build-name="${{ github.run_number }}" \
            --build-number="${{ github.run_number }}" \
            --export-options-plist=ios/ExportOptions.plist
        working-directory: app

      - name: Upload IPA
        if: secrets.IOS0222 != ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: app/build/ios/ipa/*.ipa
