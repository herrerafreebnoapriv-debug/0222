# iOS 用户端 App 构建（规约：最低 iOS 17.0，build_number 从 CI 取，可选 build-sync）
# 触发：push/main、手动 workflow_dispatch；产出：验证编译通过，如需 IPA 需配置签名 Secrets
name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

env:
  # 使用已发布的 stable 版本，避免 runner 上无此 tag 导致失败
  FLUTTER_VERSION: '3.41.0'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor (diagnostics)
        run: flutter doctor -v
        working-directory: app

      - name: Precache iOS artifacts
        run: flutter precache --ios
        working-directory: app

      - name: Get dependencies
        run: flutter pub get
        working-directory: app

      - name: Install CocoaPods (iOS)
        run: |
          cd ios && pod install --repo-update
        working-directory: app

      - name: Build iOS (no code signing)
        env:
          # 强制 Xcode 不进行代码签名，避免 CI 无证书时报错
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          EXPANDED_CODE_SIGN_IDENTITY: "-"
        run: |
          flutter build ios --release --no-codesign -v \
            --build-name="${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"
        working-directory: app

      # 如需产出 IPA 并上报 build-sync，需在仓库配置 Secrets：
      # BUILD_TOKEN、API_BASE（如 https://api.sdkdns.top）、证书与描述文件等，并增加 archive + export 步骤
