# iOS Mini 版用户端构建（无 Jitsi 依赖，单独产出 IPA）
# 触发：push/main 且 ios_mini/** 变更、或手动 workflow_dispatch
name: iOS Mini Build

on:
  push:
    branches: [main]
    paths:
      - 'ios_mini/**'
      - '.github/workflows/ios-mini-build.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.0'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v
        working-directory: ios_mini

      - name: Precache iOS
        run: flutter precache --ios
        working-directory: ios_mini

      - name: Get dependencies
        run: flutter pub get
        working-directory: ios_mini

      - name: Check IPA signing secrets
        id: ipa_secrets
        run: |
          echo "has_cert=$([ -n \"$IOS0222\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_provision=$([ -n \"$BUILD_PROVISION_PROFILE_BASE64\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_export_options=$([ -n \"$EXPORT_OPTIONS_PLIST\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          IOS0222: ${{ secrets.IOS0222 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}

      - name: Build iOS (no code signing)
        if: steps.ipa_secrets.outputs.has_cert != 'true'
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          EXPANDED_CODE_SIGN_IDENTITY: "-"
        run: |
          flutter build ios --release --no-codesign -v \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"
        working-directory: ios_mini

      - name: Create keychain and import certificate
        if: steps.ipa_secrets.outputs.has_cert == 'true'
        env:
          IOS0222: ${{ secrets.IOS0222 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$IOS0222" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        id: install_provision
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          PLIST=$(security cms -D -i /tmp/profile.mobileprovision)
          UUID=$(echo "$PLIST" | plutil -extract UUID raw -)
          TEAM_ID=$(echo "$PLIST" | plutil -extract TeamIdentifier.0 raw - 2>/dev/null || echo "$PLIST" | plutil -extract TeamIdentifier raw - 2>/dev/null)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"
          echo "profile_uuid=$UUID" >> $GITHUB_OUTPUT
          echo "team_id=$TEAM_ID" >> $GITHUB_OUTPUT

      - name: Write ExportOptions.plist from secret
        if: steps.ipa_secrets.outputs.has_export_options == 'true'
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          echo "$EXPORT_OPTIONS_PLIST" > ios_mini/ios/ExportOptions.plist
        working-directory: .

      - name: Build iOS (no codesign) for IPA
        if: steps.ipa_secrets.outputs.has_cert == 'true'
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          EXPANDED_CODE_SIGN_IDENTITY: "-"
        run: |
          flutter build ios --release --no-codesign -v \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"
        working-directory: ios_mini

      - name: Prepare ExportOptions with profile UUID
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        run: |
          PROFILE_UUID="${{ steps.install_provision.outputs.profile_uuid }}"
          cat > ios_mini/ios/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.suyun9289.test</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          PLIST
        working-directory: .

      - name: Set Runner-only code signing in project
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        run: |
          python3 ios_mini/ios/scripts/set_runner_signing.py \
            ios_mini/ios/Runner.xcodeproj/project.pbxproj \
            "${{ steps.install_provision.outputs.team_id }}" \
            "${{ steps.install_provision.outputs.profile_uuid }}"
        working-directory: .

      - name: Archive and export IPA (iPhone Distribution)
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="iPhone Distribution"
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
        working-directory: ios_mini

      - name: Upload IPA
        if: steps.ipa_secrets.outputs.has_cert == 'true' && steps.ipa_secrets.outputs.has_provision == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-mini-ipa-${{ github.run_number }}
          path: ios_mini/build/ios/ipa/*.ipa
