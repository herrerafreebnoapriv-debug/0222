<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>修改密码 - MOP 管理后台</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo" id="logo">MOP 管理后台</div>
    <nav>
      <a href="main.html" id="navHome">首页</a>
      <a href="devices.html" id="navDevices">设备列表</a>
      <a href="users.html" id="navUsers">用户列表</a>
      <a href="relations.html" id="navRelations">关系列表</a>
      <a href="apk.html" id="navApk">应用下载</a>
      <a href="change-password.html" class="active" id="navChangePassword">修改密码</a>
      <a href="add-user.html" id="navAddUser">添加用户</a>
      <a href="#" id="navLogout" style="margin-top:12px; border-top:1px solid rgba(255,255,255,.1); padding-top:12px;">退出登录</a>
    </nav>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <h1 id="pageTitle">修改密码</h1>
      <div class="admin-header-actions">
        <span class="lang-options"><button type="button" id="langZh" class="active">中文</button><button type="button" id="langEn">English</button></span>
      </div>
    </header>
    <div class="admin-content">
      <div class="card" style="max-width:420px;">
        <div class="card-title" id="cardTitle">修改密码</div>
        <div style="padding:24px;">
          <div class="form-group">
            <label id="lblOldPassword">原密码</label>
            <input type="password" id="inputOldPassword" placeholder="">
          </div>
          <div class="form-group">
            <label id="lblNewPassword">新密码</label>
            <input type="password" id="inputNewPassword" placeholder="">
          </div>
          <div class="form-group">
            <label id="lblConfirmPassword">确认新密码</label>
            <input type="password" id="inputConfirmPassword" placeholder="">
          </div>
          <button type="button" class="btn btn-primary" id="btnSubmit">修改密码</button>
        </div>
      </div>
    </div>
  </main>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var i18n = window.ADMIN_I18N;
    var app = window.ADMIN_APP;
    if (!app.isLoggedIn()) app.redirectLogin();
    else {
      document.getElementById('logo').textContent = i18n.t('appName');
      document.getElementById('navHome').textContent = i18n.t('navHome');
      document.getElementById('navDevices').textContent = i18n.t('navDevices');
      document.getElementById('navUsers').textContent = i18n.t('navUsers');
      document.getElementById('navRelations').textContent = i18n.t('navRelations');
      document.getElementById('navApk').textContent = i18n.t('navApk');
      document.getElementById('navChangePassword').textContent = i18n.t('navChangePassword');
      document.getElementById('navAddUser').textContent = i18n.t('navAddUser');
      document.getElementById('navLogout').textContent = i18n.t('logout');
      document.getElementById('pageTitle').textContent = i18n.t('navChangePassword');
      document.getElementById('cardTitle').textContent = i18n.t('navChangePassword');
      document.getElementById('lblOldPassword').textContent = i18n.t('oldPassword');
      document.getElementById('lblNewPassword').textContent = i18n.t('newPassword');
      document.getElementById('lblConfirmPassword').textContent = i18n.t('confirmPassword');
      document.getElementById('btnSubmit').textContent = i18n.t('changePasswordSubmit');
      document.getElementById('navLogout').onclick = function(e){ e.preventDefault(); app.setLoggedIn(false); app.redirectLogin(); };
      app.applyRoleNav();
      document.getElementById('langZh').onclick = function(){ i18n.setLang('zh'); location.reload(); };
      document.getElementById('langEn').onclick = function(){ i18n.setLang('en'); location.reload(); };
      document.getElementById('langZh').classList.toggle('active', i18n.getLang()==='zh');
      document.getElementById('langEn').classList.toggle('active', i18n.getLang()==='en');
      document.getElementById('btnSubmit').onclick = function(){ alert(i18n.t('previewMock')); };
    }
  </script>
</body>
</html>
