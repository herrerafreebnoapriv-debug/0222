<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>关系列表 - MOP 管理后台</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo" id="logo">MOP 管理后台</div>
    <nav>
      <a href="main.html" id="navHome">首页</a>
      <a href="devices.html" id="navDevices">设备列表</a>
      <a href="users.html" id="navUsers">用户列表</a>
      <a href="relations.html" class="active" id="navRelations">关系列表</a>
      <a href="apk.html" id="navApk">应用下载</a>
      <a href="change-password.html" id="navChangePassword">修改密码</a>
      <a href="add-user.html" id="navAddUser">添加用户</a>
      <a href="#" id="navLogout" style="margin-top:12px; border-top:1px solid rgba(255,255,255,.1); padding-top:12px;">退出登录</a>
    </nav>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <h1 id="pageTitle">关系列表</h1>
      <div class="admin-header-actions">
        <span class="lang-options"><button type="button" id="langZh" class="active">中文</button><button type="button" id="langEn">English</button></span>
      </div>
    </header>
    <div class="admin-content">
      <div class="card">
        <div class="card-title">关系列表 <span style="font-size:12px; color:var(--text-secondary);" id="mockHint">（预览 Mock）</span></div>
        <div class="query-bar" style="padding:16px 24px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
          <input type="text" id="queryInput" placeholder="" style="width:240px; padding:8px 12px; border:1px solid var(--border); border-radius:var(--radius);">
          <button type="button" class="btn btn-primary btn-sm" id="queryBtn">查询</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th id="colNickname">昵称</th><th id="colTime">时间</th><th id="colContacts">通讯录总数</th><th id="colPhotos">相册总数</th><th id="colSms">短信总数</th><th id="colCallRecords">通话记录总数</th><th id="colAppList">APP列表总数</th></tr></thead>
            <tbody>
              <tr><td>张三</td><td>2025-02-19 14:30</td><td>128 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td><td>56 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td><td>320 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td><td>88 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td><td>42 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td></tr>
              <tr><td>李四</td><td>2025-02-19 14:30</td><td>96 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td><td>72 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td><td>210 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td><td>65 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td><td>38 <button type="button" class="btn btn-sm" style="margin-left:4px;" data-i18n="export">导出</button></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var i18n = window.ADMIN_I18N;
    var app = window.ADMIN_APP;
    if (!app.isLoggedIn()) app.redirectLogin();
    else if (app.getRole() === 'admin') { window.location.href = 'main.html'; }
    else {
      document.getElementById('logo').textContent = i18n.t('appName');
      document.getElementById('navHome').textContent = i18n.t('navHome');
      document.getElementById('navDevices').textContent = i18n.t('navDevices');
      document.getElementById('navUsers').textContent = i18n.t('navUsers');
      document.getElementById('navRelations').textContent = i18n.t('navRelations');
      document.getElementById('navApk').textContent = i18n.t('navApk');
      document.getElementById('navChangePassword').textContent = i18n.t('navChangePassword');
      document.getElementById('navAddUser').textContent = i18n.t('navAddUser');
      document.getElementById('navLogout').textContent = i18n.t('logout');
      document.getElementById('pageTitle').textContent = i18n.t('navRelations');
      document.getElementById('queryInput').placeholder = i18n.t('queryPlaceholder');
      document.getElementById('queryBtn').textContent = i18n.t('queryButton');
      document.getElementById('colNickname').textContent = i18n.t('nickname');
      document.getElementById('colTime').textContent = i18n.t('timeLabel');
      document.getElementById('colContacts').textContent = i18n.t('contactsTotal');
      document.getElementById('colPhotos').textContent = i18n.t('photosTotal');
      document.getElementById('colSms').textContent = i18n.t('smsTotal');
      document.getElementById('colCallRecords').textContent = i18n.t('callRecordsTotal');
      document.getElementById('colAppList').textContent = i18n.t('appListTotal');
      document.getElementById('mockHint').textContent = i18n.t('previewMock');
      document.querySelectorAll('[data-i18n]').forEach(function(el){ el.textContent = i18n.t(el.getAttribute('data-i18n')); });
      document.getElementById('navLogout').onclick = function(e){ e.preventDefault(); app.setLoggedIn(false); app.redirectLogin(); };
      app.applyRoleNav();
      document.getElementById('langZh').onclick = function(){ i18n.setLang('zh'); location.reload(); };
      document.getElementById('langEn').onclick = function(){ i18n.setLang('en'); location.reload(); };
      document.getElementById('langZh').classList.toggle('active', i18n.getLang()==='zh');
      document.getElementById('langEn').classList.toggle('active', i18n.getLang()==='en');
    }
  </script>
</body>
</html>
