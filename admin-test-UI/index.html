<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员登录 - MOP</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <h1 id="loginTitle">管理员登录</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username" id="labelUser">用户名</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password" id="labelPw">密码</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-group captcha-group">
        <label id="captchaLabel">滑动完成拼图验证</label>
        <div class="captcha-puzzle-wrap" id="captchaWrap">
          <canvas id="captchaBg" class="captcha-bg" width="250" height="60"></canvas>
          <div class="captcha-piece-wrap" id="captchaPieceWrap">
            <canvas id="captchaPiece" class="captcha-piece" width="42" height="60"></canvas>
          </div>
          <span class="captcha-hint" id="captchaHint">向右滑动完成拼图</span>
        </div>
        <input type="hidden" id="captchaVerified" value="0">
      </div>
      <p id="loginError" class="error-hint" style="display:none; color:var(--danger); margin-bottom:12px;"></p>
      <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
    </form>
  </div>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/admin-api.js"></script>
  <script src="assets/js/captcha-puzzle.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
