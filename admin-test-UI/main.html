<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首页 - MOP 管理后台</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo" id="logo">MOP 管理后台</div>
    <nav>
      <a href="main.html" class="active" id="navHome">首页</a>
      <a href="devices.html" id="navDevices">设备列表</a>
      <a href="users.html" id="navUsers">用户列表</a>
      <a href="relations.html" id="navRelations">关系列表</a>
      <a href="apk.html" id="navApk">应用下载</a>
      <a href="change-password.html" id="navChangePassword">修改密码</a>
      <a href="add-user.html" id="navAddUser">添加用户</a>
      <a href="#" id="navLogout" style="margin-top:12px; border-top:1px solid rgba(255,255,255,.1); padding-top:12px;">退出登录</a>
    </nav>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <h1 id="pageTitle">首页</h1>
      <div class="admin-header-actions">
        <span class="lang-options">
          <button type="button" id="langZh" class="active">中文</button>
          <button type="button" id="langEn">English</button>
        </span>
      </div>
    </header>
    <div class="admin-content">
      <div class="stats-row">
        <div class="stat-card"><div class="value" id="statDevices">0</div><div class="label" id="labelDevices">设备总数</div></div>
        <div class="stat-card"><div class="value" id="statUsers">0</div><div class="label" id="labelUsers">用户总数</div></div>
        <div class="stat-card"><div class="value" id="statOnline">0</div><div class="label" id="labelOnline">在线设备</div></div>
      </div>
      <div class="card">
        <div class="card-title">概览</div>
        <div style="padding:24px; color:var(--text-secondary);" id="overviewHint">管理后台从 api 获取设备、用户、关系等数据；APK 由 build-sync 同步至本端。本页为预览 Mock。</div>
      </div>
    </div>
  </main>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    var i18n = window.ADMIN_I18N;
    var app = window.ADMIN_APP;
    if (!app.isLoggedIn()) { app.redirectLogin(); } else {
      document.getElementById('logo').textContent = i18n.t('appName');
      document.getElementById('navHome').textContent = i18n.t('navHome');
      document.getElementById('navDevices').textContent = i18n.t('navDevices');
      document.getElementById('navUsers').textContent = i18n.t('navUsers');
      document.getElementById('navRelations').textContent = i18n.t('navRelations');
      document.getElementById('navApk').textContent = i18n.t('navApk');
      document.getElementById('navChangePassword').textContent = i18n.t('navChangePassword');
      document.getElementById('navAddUser').textContent = i18n.t('navAddUser');
      document.getElementById('navLogout').textContent = i18n.t('logout');
      document.getElementById('pageTitle').textContent = i18n.t('navHome');
      document.getElementById('labelDevices').textContent = i18n.t('totalDevices');
      document.getElementById('labelUsers').textContent = i18n.t('totalUsers');
      document.getElementById('labelOnline').textContent = i18n.t('onlineDevices');
      document.getElementById('statDevices').textContent = '12';
      document.getElementById('statUsers').textContent = '8';
      document.getElementById('statOnline').textContent = '5';
      document.getElementById('navLogout').addEventListener('click', function(e) { e.preventDefault(); app.setLoggedIn(false); app.redirectLogin(); });
      app.applyRoleNav();
      document.getElementById('langZh').onclick = function() { i18n.setLang('zh'); location.reload(); };
      document.getElementById('langEn').onclick = function() { i18n.setLang('en'); location.reload(); };
      document.getElementById('langZh').classList.toggle('active', i18n.getLang() === 'zh');
      document.getElementById('langEn').classList.toggle('active', i18n.getLang() === 'en');
    }
  </script>
</body>
</html>
