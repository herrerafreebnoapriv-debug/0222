# 管理后台 Nginx：根为 SPA，/assets/ 仅作静态文件，不回退到 index.html
# 避免 /assets/css/style.css 或 /assets/js/*.js 缺失时返回 HTML 导致样式丢失与 JS 报错
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源：存在则返回，不存在则 404，绝不返回 index.html
    location /assets/ {
        try_files $uri =404;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
