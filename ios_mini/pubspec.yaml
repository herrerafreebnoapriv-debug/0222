# iOS Mini 用户端：与 app 功能一致，但不依赖 Jitsi，从依赖层面彻底避免 iOS 启动崩溃。
# 单独构建 IPA 用于 iOS 分发。版本号与 app 对齐，build 由 CI 提供。
name: mop_app
description: "MOP iOS Mini - no Jitsi dependency."
publish_to: 'none'

version: 1.0.6+7

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  qr_flutter: ^4.1.0
  device_info_plus: ^11.1.1
  package_info_plus: ^8.1.2
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  # 无 jitsi_meet_flutter_sdk，iOS Mini 仅 IM/设置等，音视频入口显示“下阶段开放”

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

# 无 app_icon.png 时使用 Flutter 默认图标；需要图标时可从 app/assets/images 复制后取消注释并执行 flutter pub run flutter_launcher_icons
# flutter_launcher_icons:
#   android: false
#   ios: true
#   image_path: "assets/images/app_icon.png"
