# ios_mini：仅 iOS 用户端，不含 Jitsi，从依赖层面彻底避免 Jitsi 相关崩溃
name: mop_app
description: "MOP iOS Mini - 无 Jitsi 的精简 iOS 用户端"
publish_to: 'none'

version: 1.0.6+7

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  qr_flutter: ^4.1.0
  device_info_plus: ^11.1.1
  package_info_plus: ^8.1.2
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  # 刻意不依赖 jitsi_meet_flutter_sdk，仅 iOS 使用本工程

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/images/app_icon.png"
